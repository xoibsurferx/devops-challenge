apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: devops-challenge
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: GitOps for the Next.js + Postgres demo stack
  sourceRepos:
    - "https://github.com/xoibsurferx/*"
    - "git@github.com:xoibsurferx/*"
  destinations:
    - namespace: devops-challenge
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: policy
      kind: PodDisruptionBudget
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
