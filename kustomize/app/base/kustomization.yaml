# Base stack: in-cluster PostgreSQL (demo/small envs) + Next.js.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: devops-challenge
resources:
  - namespace.yaml
  - postgres/secret.yaml
  - postgres/pvc.yaml
  - postgres/deployment.yaml
  - postgres/service.yaml
  - app/serviceaccount.yaml
  - app/secret-app-env.yaml
  - app/deployment.yaml
  - app/service.yaml
  - app/pdb.yaml
images:
  - name: devops-challenge-app
    newName: docker.io/xoibsurferx/devops-challenge
    newTag: latest
labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/part-of: devops-challenge
