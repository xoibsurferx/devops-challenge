apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: devops-challenge
  labels:
    app.kubernetes.io/component: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
    spec:
      # Volume owned by the postgres GID; kubelet chowns the PVC. postgres:17-alpine uses user 70.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 70
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB'
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB'
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          # Drop-all blocks CAP_CHOWN; the image entrypoint must chown/chmod data + /var/run (see docker-library/postgres).
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - SETGID
                - SETUID
                - SETPCAP
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
